<div class="main">
  <h2>Member Tree</h2>

  <div class="tree-section">
    <app-tree [nodes]="members"></app-tree>
  </div>

  <button class="add-btn" (click)="openPopup()">Add Member</button>
</div>

<div class="modal" *ngIf="showPopup">
  <div class="modal-content">
    <h3>Add Member</h3>

    <label for="name">Name</label>
    <input id="name" [(ngModel)]="name" placeholder="Enter name" />

    <label for="parent">Parent</label>
    <select id="parent" [(ngModel)]="selectedParent">
      <option [ngValue]="null">No Parent (Root)</option>
      <option *ngFor="let m of flatMembers" [ngValue]="m._id">
        {{ m.name }}
      </option>
    </select>

    <div class="modal-actions">
      <button class="primary" (click)="addMember()">Save</button>
      <button type="button" (click)="closePopup()">Cancel</button>
    </div>
  </div>
</div>
